name: Build and Push Docker Image
description: 'Build and push Docker image to Azure Container Registry with a tag as the change ID. If the image already exists, it will not be rebuilt.'

inputs:
  tag:
    description: 'Docker image tag to build and push'
    required: true

runs:
  using: 'composite'
  steps:
    - name: Login to Azure Container Registry
      shell: bash
      run: az acr login --name procosys

    - name: Get DevOps Token
      id: 'get-devops-token'
      uses: ./.github/actions/get-devops-token

    - name: Build and push Docker image
      uses: docker/build-push-action@v7
      with:
        context: ./src
        file: ./src/Equinor.ProCoSys.Preservation.WebApi/Dockerfile
        push: true
        build-args: |
          FEED_ACCESSTOKEN=${{ steps.get-devops-token.outputs.token }}
        tags: |
          procosys.azurecr.io/preservation/api:${{ inputs.tag }}
          procosys.azurecr.io/preservation/api:latest
