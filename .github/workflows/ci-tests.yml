name: 🤖🦾 Run Tests

on:
  pull_request:

permissions:
  id-token: write
  contents: read

jobs:
  run-test:
    name: Run tests
    runs-on: ubuntu-latest
    environment: dev
    strategy:
      matrix:
        project: [
          Equinor.ProCoSys.Preservation.Command.Tests/,
          Equinor.ProCoSys.Preservation.Domain.Tests/,
          Equinor.ProCoSys.Preservation.Infrastructure.Tests/,
          Equinor.ProCoSys.Preservation.MainApi.Tests/,
          Equinor.ProCoSys.Preservation.Query.Tests/,
          Equinor.ProCoSys.Preservation.Test.Common/,
          Equinor.ProCoSys.Preservation.WebApi.Tests/,
        ]
      fail-fast: false
    steps:
      - uses: actions/checkout@v5

      - name: 'Login to Azure'
        uses: azure/login@v3
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          allow-no-subscriptions: true

      - name: Get DevOps Token
        id: 'get-devops-token'
        uses: ./.github/actions/get-devops-token
      
      - name: Configure Nuget
        uses: ./.github/actions/nuget-config
        with:
          access-token: ${{ steps.get-devops-token.outputs.token }}

      - name: Setup dotnet 8
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Run tests - ${{ matrix.project }}
        run: |
          dotnet test ./src/tests/${{ matrix.project }} -c Release

  all-tests-pass:
    name: All tests pass
    if: always()
    needs: run-test
    runs-on: ubuntu-latest
    steps:
      - name: Validate matrix result
        run: |
          if [ "${{ needs.run-test.result }}" != "success" ]; then
            echo "One or more test jobs failed or were cancelled"
            exit 1
          fi
